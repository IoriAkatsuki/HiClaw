<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Edge AI | 实时检测终端</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(20, 22, 28, 0.7);
            --accent-color: #00f3ff;
            --accent-secondary: #00ff9d;
            --text-main: #ffffff;
            --text-dim: #8b9bb4;
            --border-color: rgba(0, 243, 255, 0.2);
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 157, 0.05) 0%, transparent 20%);
        }
        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 24px; height: 24px; background: var(--accent-color);
            border-radius: 4px; box-shadow: 0 0 15px var(--accent-color);
        }
        h1 { font-size: 18px; letter-spacing: 1px; font-weight: 600; }
        .status-badge {
            font-family: var(--font-mono); font-size: 12px; padding: 4px 12px;
            border-radius: 20px; background: rgba(0, 255, 157, 0.1);
            color: var(--accent-secondary); border: 1px solid rgba(0, 255, 157, 0.3);
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
        main {
            flex: 1; display: grid; grid-template-columns: 1fr 320px; gap: 20px;
            padding: 20px; height: calc(100vh - 60px);
        }
        .video-section {
            background: #000; border-radius: 12px; border: 1px solid var(--border-color);
            position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        .video-feed { max-width: 100%; max-height: 100%; object-fit: contain; }
        .video-overlay {
            position: absolute; top: 16px; left: 16px;
            font-family: var(--font-mono); font-size: 12px; color: var(--accent-color);
            text-shadow: 0 0 5px rgba(0,0,0,0.8); pointer-events: none;
        }
        aside {
            background: var(--card-bg); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-header {
            padding: 16px; font-size: 14px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
            background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { background: var(--card-bg); padding: 20px; text-align: center; }
        .stat-value { font-family: var(--font-mono); font-size: 24px; color: var(--text-main); font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .detection-list { flex: 1; overflow-y: auto; padding: 10px; }
        .det-item {
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--accent-color);
            padding: 10px 14px; margin-bottom: 8px; border-radius: 0 6px 6px 0;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s;
        }
        .det-item:hover { background: rgba(255,255,255,0.06); transform: translateX(2px); }
        .det-name { font-weight: 500; font-size: 14px; }
        .det-conf { 
            font-family: var(--font-mono); font-size: 12px; color: var(--accent-color);
            background: rgba(0, 243, 255, 0.1); padding: 2px 6px; border-radius: 4px;
        }
        .empty-state { padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.4); }
            70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(0, 255, 157, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo-icon"></div>
            <h1>ICT <span style="font-weight: 300; opacity: 0.7">VISION HUB</span></h1>
        </div>
        <div class="status-badge"><div class="status-dot"></div>SYSTEM ONLINE</div>
    </header>
    <main>
        <div class="video-section">
            <img id="videoFeed" class="video-feed" src="frame.jpg" alt="Live Feed">
            <div class="video-overlay">CAM_01: /dev/video4<br>MODE: NPU_ACCELERATED</div>
        </div>
        <aside>
            <div class="panel-header">Real-time Metrics</div>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-value" id="fpsVal">--</div><div class="stat-label">FPS</div></div>
                <div class="stat-item"><div class="stat-value" id="inferVal">--</div><div class="stat-label">LATENCY (ms)</div></div>
            </div>
            <div class="panel-header" style="margin-top: 10px;">Detections Log</div>
            <div class="detection-list" id="detList"><div class="empty-state">Waiting for data...</div></div>
        </aside>
    </main>
    <script>
        const videoImg = document.getElementById('videoFeed');
        const fpsVal = document.getElementById('fpsVal');
        const inferVal = document.getElementById('inferVal');
        const detList = document.getElementById('detList');
        async function updateDashboard() {
            const now = Date.now();
            const newImg = new Image();
            newImg.onload = () => { videoImg.src = newImg.src; };
            newImg.src = 'frame.jpg?t=' + now;
            try {
                const response = await fetch('state.json?t=' + now);
                if (response.ok) {
                    const data = await response.json();
                    fpsVal.innerText = data.fps ? data.fps.toFixed(1) : '0.0';
                    inferVal.innerText = data.infer_ms ? data.infer_ms.toFixed(1) : '0.0';
                    updateDetectionList(data.dets);
                }
            } catch (e) { console.error('Fetch error', e); }
            setTimeout(updateDashboard, 100);
        }
        function updateDetectionList(dets) {
            if (!dets || dets.length === 0) {
                detList.innerHTML = '<div class="empty-state">NO OBJECTS DETECTED</div>';
                return;
            }
            let html = '';
            dets.slice(0, 20).forEach(d => {
                const score = (d.score * 100).toFixed(0) + '%';
                const name = d.name || 'Unknown';
                html += '<div class="det-item"><span class="det-name">' + name + '</span><span class="det-conf">' + score + '</span></div>';
            });
            detList.innerHTML = html;
        }
        updateDashboard();
    </script>
</body>
</html>
