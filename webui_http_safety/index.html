<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Safety Monitor - Route B</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 165, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaa;
            font-size: 1.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 165, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .video-panel {
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 75%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        #frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2em;
            backdrop-filter: blur(10px);
            border: 2px solid;
            transition: all 0.3s;
        }

        .status-safe {
            background: rgba(34, 197, 94, 0.3);
            border-color: #22c55e;
            color: #22c55e;
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.5);
            border-color: #ef4444;
            color: #fff;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .stats-panel h2 {
            color: #ff6b35;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid #ff6b35;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.95em;
        }

        .stat-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #fff;
        }

        .depth-display {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 10px;
            border: 2px solid #ff6b35;
        }

        .depth-label {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .depth-value {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .depth-unit {
            font-size: 0.5em;
            opacity: 0.7;
        }

        .alert-panel {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444;
            color: #fff;
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            z-index: 1000;
        }

        .connected {
            background: rgba(34, 197, 94, 0.3);
            border: 2px solid #22c55e;
            color: #22c55e;
        }

        .disconnected {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444;
            color: #ef4444;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connStatus">● 连接中...</div>

    <div class="container">
        <header>
            <h1>🛡️ Hand Safety Monitor</h1>
            <div class="subtitle">YOLOv8-Pose + RealSense D435 · Route B</div>
        </header>

        <div class="grid">
            <div class="panel video-panel">
                <div class="video-container">
                    <img id="frame" src="frame.jpg" alt="Camera Feed">
                    <div class="status-overlay">
                        <div class="status-badge status-safe" id="statusBadge">✓ SAFE</div>
                        <div class="status-badge" id="fpsBadge">0 FPS</div>
                    </div>
                </div>
            </div>

            <div class="panel stats-panel">
                <h2>📊 系统状态</h2>

                <div class="stat-item">
                    <span class="stat-label">推理时间</span>
                    <span class="stat-value" id="inferTime">0 ms</span>
                </div>

                <div class="stat-item">
                    <span class="stat-label">检测手数</span>
                    <span class="stat-value" id="handCount">0</span>
                </div>

                <div class="stat-item">
                    <span class="stat-label">帧率</span>
                    <span class="stat-value" id="fpsValue">0.0 FPS</span>
                </div>

                <div class="depth-display">
                    <div class="depth-label">手部最近距离</div>
                    <div class="depth-value" id="depthValue">
                        --<span class="depth-unit">mm</span>
                    </div>
                </div>

                <div class="alert-panel" id="alertPanel">
                    ⚠️ 警告：手部距离物体过近！
                </div>
            </div>
        </div>

        <footer>
            Powered by Ascend 310B · ACL Runtime · YOLOv8-Pose
        </footer>
    </div>

    <script>
        const frameImg = document.getElementById('frame');
        const statusBadge = document.getElementById('statusBadge');
        const fpsBadge = document.getElementById('fpsBadge');
        const inferTime = document.getElementById('inferTime');
        const handCount = document.getElementById('handCount');
        const fpsValue = document.getElementById('fpsValue');
        const depthValue = document.getElementById('depthValue');
        const alertPanel = document.getElementById('alertPanel');
        const connStatus = document.getElementById('connStatus');

        let isConnected = false;
        let updateCount = 0;

        async function updateState() {
            try {
                const resp = await fetch('state.json?' + Date.now());
                const data = await resp.json();

                if (!isConnected) {
                    isConnected = true;
                    connStatus.textContent = '● 已连接';
                    connStatus.className = 'connection-status connected';
                }

                // Update stats
                inferTime.textContent = data.infer_ms.toFixed(1) + ' ms';
                handCount.textContent = data.hands || 0;
                fpsValue.textContent = data.fps.toFixed(1) + ' FPS';
                fpsBadge.textContent = data.fps.toFixed(1) + ' FPS';

                // Update safety status
                if (data.is_danger) {
                    statusBadge.textContent = '⚠ DANGER';
                    statusBadge.className = 'status-badge status-danger';
                    alertPanel.className = 'alert-panel alert-danger';

                    if (data.min_depth_mm !== null) {
                        depthValue.innerHTML = data.min_depth_mm.toFixed(0) + '<span class="depth-unit">mm</span>';
                    }
                } else {
                    statusBadge.textContent = '✓ SAFE';
                    statusBadge.className = 'status-badge status-safe';
                    alertPanel.className = 'alert-panel';

                    if (data.min_depth_mm !== null) {
                        depthValue.innerHTML = data.min_depth_mm.toFixed(0) + '<span class="depth-unit">mm</span>';
                    } else {
                        depthValue.innerHTML = '--<span class="depth-unit">mm</span>';
                    }
                }

                updateCount++;
            } catch (err) {
                if (isConnected) {
                    isConnected = false;
                    connStatus.textContent = '● 连接断开';
                    connStatus.className = 'connection-status disconnected';
                }
            }
        }

        function updateFrame() {
            frameImg.src = 'frame.jpg?' + Date.now();
        }

        // Update state every 100ms
        setInterval(updateState, 100);

        // Update frame every 33ms (~30 FPS)
        setInterval(updateFrame, 33);
    </script>
</body>
</html>
