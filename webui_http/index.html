<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Edge AI | 实时检测终端</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: rgba(20, 22, 28, 0.7);
            --accent-color: #00f3ff; /* 科技蓝 */
            --accent-secondary: #00ff9d; /* 成功绿 */
            --text-main: #ffffff;
            --text-dim: #8b9bb4;
            --border-color: rgba(0, 243, 255, 0.2);
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 243, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 157, 0.05) 0%, transparent 20%);
        }

        /* 顶部导航 */
        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-color);
            border-radius: 4px;
            box-shadow: 0 0 15px var(--accent-color);
        }

        h1 { font-size: 18px; letter-spacing: 1px; font-weight: 600; }
        
        .status-badge {
            font-family: var(--font-mono);
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 255, 157, 0.1);
            color: var(--accent-secondary);
            border: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }

        /* 主布局 */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 60px);
        }

        /* 视频区域 */
        .video-section {
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-feed {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 16px; left: 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--accent-color);
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* 数据面板 */
        aside {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px;
            font-size: 14px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 24px;
            color: var(--text-main);
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .detection-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .det-item {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent-color);
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        
        .det-item:hover { background: rgba(255,255,255,0.06); transform: translateX(2px); }

        .det-name { font-weight: 500; font-size: 14px; }
        .det-conf { 
            font-family: var(--font-mono); 
            font-size: 12px; 
            color: var(--accent-color);
            background: rgba(0, 243, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
        }

        /* 动画 */
        @keyframes pulse {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0.4); }
            70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(0, 255, 157, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 157, 0); }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo-icon"></div>
            <h1>ICT <span style="font-weight: 300; opacity: 0.7">VISION HUB</span></h1>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            SYSTEM ONLINE
        </div>
    </header>

    <main>
        <div class="video-section">
            <img id="videoFeed" class="video-feed" src="frame.jpg" alt="Live Feed">
            <div class="video-overlay">
                CAM_01: /dev/video<br>
                MODE: NPU_ACCELERATED
            </div>
        </div>

        <aside>
            <div class="panel-header">Real-time Metrics</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="fpsVal">--</div>
                    <div class="stat-label">FPS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="inferVal">--</div>
                    <div class="stat-label">LATENCY (ms)</div>
                </div>
            </div>

            <div class="panel-header" style="margin-top: 10px;">Detections Log</div>
            <div class="detection-list" id="detList">
                <div class="empty-state">Waiting for data...</div>
            </div>
        </aside>
    </main>

    <script>
        const videoImg = document.getElementById('videoFeed');
        const fpsVal = document.getElementById('fpsVal');
        const inferVal = document.getElementById('inferVal');
        const detList = document.getElementById('detList');
        
        let lastUpdate = Date.now();

        // 核心更新循环
        async function updateDashboard() {
            const now = Date.now();
            const timestamp = now;

            // 1. 刷新图片 (利用 Image 对象预加载，防止闪烁)
            const newImg = new Image();
            newImg.onload = () => {
                videoImg.src = newImg.src;
            };
            newImg.onerror = () => {
                // 忽略加载错误（例如文件正在写入时）
            };
            newImg.src = 'frame.jpg?t=' + timestamp;

            // 2. 获取状态数据
            try {
                const response = await fetch('state.json?t=' + timestamp);
                if (response.ok) {
                    const data = await response.json();
                    
                    // 更新数值
                    fpsVal.innerText = data.fps ? data.fps.toFixed(1) : '0.0';
                    inferVal.innerText = data.infer_ms ? data.infer_ms.toFixed(1) : '0.0';

                    // 更新列表
                    updateDetectionList(data.dets);
                }
            } catch (e) {
                console.error("Data fetch error", e);
            }

            // 循环调用 (约 10fps，与后端写入频率一致)
            setTimeout(updateDashboard, 100);
        }

        function updateDetectionList(dets) {
            if (!dets || dets.length === 0) {
                detList.innerHTML = '<div class="empty-state">NO OBJECTS DETECTED</div>';
                return;
            }

            // 生成列表 HTML
            let html = '';
            // 限制显示前 20 个，防止页面卡顿
            dets.slice(0, 20).forEach(d => {
                // 根据置信度改变颜色 (可选)
                const score = (d.score * 100).toFixed(0) + '%';
                // 简单的名称映射或直接使用 class ID
                let name = d.cls; 
                // 如果您在后端有 names 映射，可以在这里处理，或者直接显示后端传来的 label
                // 假设后端现在只传了 cls id，这里暂时显示 ID
                // 如果您想显示名字，建议后端在 dets 里直接传 label 字段
                
                // 由于后端代码 postprocess 目前只传了 cls(int), 我们临时用 ID 显示
                // 您可以后续让后端 postprocess 返回 label 字符串
                
                html += `
                    <div class="det-item">
                        <span class="det-name">Object #${d.cls}</span>
                        <span class="det-conf">${score}</span>
                    </div>
                `;
            });
            detList.innerHTML = html;
        }

        // 启动
        updateDashboard();
    </script>
</body>
</html>
