<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Debug View</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 212, 255, 0.12), transparent 35%),
                radial-gradient(circle at top right, rgba(255, 107, 53, 0.14), transparent 30%),
                #0b1020;
            color: #e8eefc;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
            padding: 20px 24px;
            border-radius: 18px;
            background: rgba(10, 16, 32, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .title h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 6px;
        }

        .title p {
            color: #a9b8df;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .toggle input {
            width: 18px;
            height: 18px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(90deg, rgba(255, 107, 53, 0.85), rgba(0, 212, 255, 0.75));
        }

        .grid {
            display: grid;
            grid-template-columns: minmax(0, 2.2fr) minmax(320px, 1fr);
            gap: 20px;
        }

        .panel {
            padding: 18px;
            border-radius: 18px;
            background: rgba(10, 16, 32, 0.78);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        .frame-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
        }

        .frame-stage img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #overlayImage.hidden {
            display: none;
        }

        .legend {
            margin-top: 14px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            color: #a9b8df;
            font-size: 0.95rem;
        }

        .debug-disabled-banner {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(245, 158, 11, 0.12);
            border: 1px solid rgba(245, 158, 11, 0.35);
            color: #fcd34d;
            display: none;
        }

        .debug-disabled-banner.visible {
            display: block;
        }

        .legend span::before {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 999px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .legend .box::before {
            background: #22c55e;
        }

        .legend .locked::before {
            background: #facc15;
        }

        .legend .laser::before {
            background: #ef4444;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #fff;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .metric {
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .metric-label {
            color: #94a3c9;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 1.4rem;
            color: #fff;
            font-weight: 700;
        }

        .status-safe {
            color: #22c55e;
        }

        .status-danger {
            color: #ef4444;
        }

        .object-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 520px;
            overflow: auto;
        }

        .object-card {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .object-card.locked {
            border-color: rgba(250, 204, 21, 0.8);
            box-shadow: inset 0 0 0 1px rgba(250, 204, 21, 0.45);
        }

        .object-name {
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .object-meta {
            color: #a9b8df;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        .conn-status {
            position: fixed;
            top: 18px;
            right: 18px;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 16, 32, 0.85);
        }

        .conn-status.connected {
            color: #22c55e;
        }

        .conn-status.disconnected {
            color: #ef4444;
        }

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="conn-status" id="connStatus">● 连接中...</div>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>调试视图</h1>
                <p>摄像头原始画面 + 独立识别框图层。激光为摄像头实拍内容，识别框可单独关闭。</p>
            </div>
            <div class="actions">
                <label class="toggle">
                    <input id="overlayToggle" type="checkbox" checked>
                    <span>显示识别框图层</span>
                </label>
                <a class="nav-link" href="index.html">返回主页</a>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="section-title">实时调试画面</div>
                <div class="frame-stage">
                    <img id="debugFrame" src="debug_frame.jpg" alt="Debug Frame">
                    <img id="overlayImage" src="debug_overlay.png" alt="Detection Overlay">
                </div>
                <div class="debug-disabled-banner" id="debugDisabledBanner">调试图产物已关闭，请使用带调试开关的启动参数重新运行。</div>
                <div class="legend">
                    <span class="box">普通识别框</span>
                    <span class="locked">当前锁定目标</span>
                    <span class="laser">激光为原始相机画面内的真实光斑/轨迹</span>
                </div>
            </div>

            <div class="panel">
                <div class="section-title">调试状态</div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-label">状态</div>
                        <div class="metric-value" id="safetyStatus">--</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">FPS</div>
                        <div class="metric-value" id="fpsValue">0.0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">检测目标</div>
                        <div class="metric-value" id="objectCount">0</div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">锁定目标</div>
                        <div class="metric-value" id="lockedCount">0</div>
                    </div>
                </div>

                <div class="section-title">目标列表</div>
                <div class="object-list" id="objectList"></div>
            </div>
        </div>
    </div>

    <script>
        const debugFrame = document.getElementById('debugFrame');
        const overlayImage = document.getElementById('overlayImage');
        const overlayToggle = document.getElementById('overlayToggle');
        const connStatus = document.getElementById('connStatus');
        const safetyStatus = document.getElementById('safetyStatus');
        const fpsValue = document.getElementById('fpsValue');
        const objectCount = document.getElementById('objectCount');
        const lockedCount = document.getElementById('lockedCount');
        const objectList = document.getElementById('objectList');
        const debugDisabledBanner = document.getElementById('debugDisabledBanner');

        let isConnected = false;
        let debugAssetsEnabled = true;

        overlayToggle.addEventListener('change', () => {
            overlayImage.classList.toggle('hidden', !overlayToggle.checked);
        });

        function renderObjects(items) {
            objectList.innerHTML = '';
            if (!items || items.length === 0) {
                objectList.innerHTML = '<div class="object-card"><div class="object-meta">当前没有检测到目标。</div></div>';
                return;
            }

            for (const item of items) {
                const card = document.createElement('div');
                card.className = 'object-card' + (item.locked ? ' locked' : '');
                const boxText = Array.isArray(item.box) ? item.box.join(', ') : '--';
                card.innerHTML = `
                    <div class="object-name">${item.name || 'unknown'}${item.track_id !== undefined ? ` #${item.track_id}` : ''}</div>
                    <div class="object-meta">置信度: ${(item.score ?? 0).toFixed(3)}</div>
                    <div class="object-meta">框: [${boxText}]</div>
                    <div class="object-meta">${item.locked ? '已锁定' : '未锁定'}</div>
                `;
                objectList.appendChild(card);
            }
        }

        async function updateDebugState() {
            try {
                const resp = await fetch('state.json?' + Date.now());
                const data = await resp.json();

                if (!isConnected) {
                    isConnected = true;
                    connStatus.textContent = '● 已连接';
                    connStatus.className = 'conn-status connected';
                }

                safetyStatus.textContent = data.is_danger ? 'DANGER' : 'SAFE';
                safetyStatus.className = 'metric-value ' + (data.is_danger ? 'status-danger' : 'status-safe');
                fpsValue.textContent = (data.fps || 0).toFixed(1);
                objectCount.textContent = data.objects || 0;
                lockedCount.textContent = (data.locked_track_ids || []).length;
                debugAssetsEnabled = data.write_debug_assets !== false;
                debugDisabledBanner.classList.toggle('visible', !debugAssetsEnabled);
                if (!debugAssetsEnabled) {
                    debugFrame.removeAttribute('src');
                    overlayImage.removeAttribute('src');
                    overlayImage.classList.add('hidden');
                } else if (overlayToggle.checked) {
                    overlayImage.classList.remove('hidden');
                }
                renderObjects(data.object_details || []);
            } catch (err) {
                if (isConnected) {
                    isConnected = false;
                    connStatus.textContent = '● 连接断开';
                    connStatus.className = 'conn-status disconnected';
                }
            }
        }

        function updateImages() {
            if (!debugAssetsEnabled) {
                return;
            }
            debugFrame.src = 'debug_frame.jpg?' + Date.now();
            overlayImage.src = 'debug_overlay.png?' + Date.now();
        }

        setInterval(updateDebugState, 120);
        setInterval(updateImages, 50);
        updateDebugState();
        updateImages();
    </script>
</body>
</html>
